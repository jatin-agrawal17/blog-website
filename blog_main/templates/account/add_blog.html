{% extends "base.html" %}

{% block content %}
{% load crispy_forms_tags %}
<form action="{% url 'add_blog' %}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.media }}
    {{form | crispy}}
    <button type="submit" class="btn btn-warning">
        Publish Blog
    </button>
</form>



{% endblock %}
