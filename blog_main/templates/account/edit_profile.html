{% extends "base.html" %}

{% block content %}
{% load crispy_forms_tags %}
<form action="{% url 'edit_profile' %}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <h4>User Information</h4>
    {{ user_form | crispy}}

    <h4>Profile Information</h4>
    {{ profile_form | crispy}}
    <button type="submit" class="btn btn-warning">
        Save Changes
    </button>
</form>
{% endblock %}
