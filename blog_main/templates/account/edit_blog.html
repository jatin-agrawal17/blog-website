{% extends "base.html" %}

{% block content %}
{% load crispy_forms_tags %}
<form action="{% url 'edit_blog' blog.id %}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.media }}
    {{form | crispy}}
    <button type="submit" class="btn btn-warning">
        Edit Blog
    </button>
</form>

{% endblock %}
